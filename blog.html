<script src="script.js"></script>
<script type="module" src="firebase-status.js"></script>

<script type="module">
  import {
    collection, addDoc, doc, deleteDoc, updateDoc,
    query, orderBy, onSnapshot, serverTimestamp, increment
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  function asteaptaFirebase() {
    return new Promise(resolve => {
      const verifica = () => {
        if (window.firebaseDb) resolve();
        else setTimeout(verifica, 50);
      };
      verifica();
    });
  }

  await asteaptaFirebase();

  window.firebaseFns = {
    collection, addDoc, doc, deleteDoc, updateDoc,
    query, orderBy, onSnapshot, serverTimestamp, increment
  };
  window.firebaseReady = true;

  if (window.startLiveBlog) window.startLiveBlog();
</script>

<script>
  let editIndex = null;
  let postariCache = [];
  let unsubscribeBlog = null;
  let isFirstLoad = true;

  window.onAdminStateChange = function(esteLogat) {
    if (!isFirstLoad) {
      renderPosts();
    }
  };

  const VOTURI_KEY = 'necaz_voturi';
  function getVoturi() {
    const data = localStorage.getItem(VOTURI_KEY);
    return data ? JSON.parse(data) : {};
  }
  function salveazaVoturi(voturi) {
    localStorage.setItem(VOTURI_KEY, JSON.stringify(voturi));
  }

  const voturiLocaleRecente = new Set();
  function marcheazaVotLocal(postId) {
    voturiLocaleRecente.add(postId);
    setTimeout(() => voturiLocaleRecente.delete(postId), 1500);
  }

  function bumpButton(postId, tip) {
    const btn = document.querySelector(`[data-post-id="${postId}"] .vote-btn[data-vote-type="${tip}"]`);
    if (!btn) return;
    btn.classList.remove('bumping');
    void btn.offsetWidth;
    btn.classList.add('bumping');
    setTimeout(() => btn.classList.remove('bumping'), 500);
  }

  function startLiveBlog() {
    if (!window.firebaseReady) return;
    if (unsubscribeBlog) unsubscribeBlog();

    const { collection, query, orderBy, onSnapshot } = window.firebaseFns;
    const q = query(collection(window.firebaseDb, 'postari'), orderBy('data', 'desc'));

    unsubscribeBlog = onSnapshot(q, (snap) => {
      const lista = [];
      const schimbari = { adaugate: [], modificate: [], sterse: [] };

      snap.docChanges().forEach(change => {
        if (change.type === 'added') schimbari.adaugate.push(change.doc.id);
        if (change.type === 'modified') schimbari.modificate.push(change.doc.id);
        if (change.type === 'removed') schimbari.sterse.push(change.doc.id);
      });

      snap.forEach(d => {
        const x = d.data();
        lista.push({
          id: d.id,
          titlu: x.titlu || '',
          categorie: x.categorie || 'general',
          continut: x.continut || '',
          data: x.data ? (x.data.toDate ? x.data.toDate().getTime() : x.data) : Date.now(),
          editat: x.editat ? (x.editat.toDate ? x.editat.toDate().getTime() : x.editat) : null,
          likes: x.likes || 0,
          dislikes: x.dislikes || 0
        });
      });

      const voturiSchimbate = {};
      lista.forEach(p => {
        const vechi = postariCache.find(c => c.id === p.id);
        if (vechi) {
          if (vechi.likes !== p.likes) {
            voturiSchimbate[p.id] = voturiSchimbate[p.id] || {};
            voturiSchimbate[p.id].likes = true;
          }
          if (vechi.dislikes !== p.dislikes) {
            voturiSchimbate[p.id] = voturiSchimbate[p.id] || {};
            voturiSchimbate[p.id].dislikes = true;
          }
        }
      });

      const aceleasiPostari = postariCache.length === lista.length &&
        postariCache.every((p, i) => p.id === lista[i].id);
      let doarVoturi = !isFirstLoad &&
        aceleasiPostari &&
        schimbari.adaugate.length === 0 &&
        schimbari.sterse.length === 0;

      if (doarVoturi) {
        lista.forEach(p => {
          const vechi = postariCache.find(c => c.id === p.id);
          if (vechi && (vechi.titlu !== p.titlu || vechi.continut !== p.continut || vechi.categorie !== p.categorie)) {
            doarVoturi = false;
          }
        });
      }

      postariCache = lista;

      if (doarVoturi) {
        lista.forEach(p => {
          if (!voturiSchimbate[p.id]) return;
          const article = document.querySelector(`[data-post-id="${p.id}"]`);
          if (!article) return;

          const likeCount = article.querySelector('.vote-btn[data-vote-type="like"] .vote-count');
          const dislikeCount = article.querySelector('.vote-btn[data-vote-type="dislike"] .vote-count');
          if (likeCount) likeCount.textContent = p.likes || 0;
          if (dislikeCount) dislikeCount.textContent = p.dislikes || 0;

          if (!voturiLocaleRecente.has(p.id)) {
            article.classList.remove('is-updated');
            void article.offsetWidth;
            article.classList.add('is-updated');
            setTimeout(() => article.classList.remove('is-updated'), 1500);
          }
        });
      } else {
        renderPosts(isFirstLoad ? null : schimbari);
      }

      if (!isFirstLoad) {
        Object.keys(voturiSchimbate).forEach(postId => {
          if (voturiLocaleRecente.has(postId)) return;
          const v = voturiSchimbate[postId];
          if (v.likes) bumpButton(postId, 'like');
          if (v.dislikes) bumpButton(postId, 'dislike');
        });
      }

      isFirstLoad = false;
    }, (err) => {
      console.error('Live blog error:', err);
      const gol = document.getElementById('blog-empty');
      gol.innerHTML = '<p>Error loading. Check Firebase config.</p>';
      gol.style.display = 'block';
    });
  }
  window.startLiveBlog = startLiveBlog;

  async function adaugaPostare() {
    if (!esteAdmin()) return;
    if (!window.firebaseReady) { alert('Firebase not ready.'); return; }

    const titlu = document.getElementById('post-title').value.trim();
    const categorie = document.getElementById('post-category').value.trim();
    const continut = document.getElementById('post-content').value.trim();

    if (!titlu || !continut) {
      alert('Title and content are required.');
      return;
    }

    const { collection, addDoc, serverTimestamp } = window.firebaseFns;
    try {
      await addDoc(collection(window.firebaseDb, 'postari'), {
        titlu, categorie: categorie || 'general', continut,
        data: serverTimestamp(),
        likes: 0,
        dislikes: 0
      });
      document.getElementById('post-title').value = '';
      document.getElementById('post-category').value = '';
      document.getElementById('post-content').value = '';
    } catch (err) {
      console.error(err);
      alert('Error saving post. Check Firebase rules.');
    }
  }

  async function stergePostare(idx) {
    if (!esteAdmin()) return;
    if (!confirm('Are you sure you want to delete this post?')) return;
    const post = postariCache[idx];
    if (!post) return;

    const el = document.querySelector(`[data-post-id="${post.id}"]`);
    if (el) el.classList.add('is-removing');

    const { doc, deleteDoc } = window.firebaseFns;
    try {
      await new Promise(r => setTimeout(r, 400));
      await deleteDoc(doc(window.firebaseDb, 'postari', post.id));
    } catch (err) {
      console.error(err);
      alert('Error deleting post.');
    }
  }

  function intraEdit(idx) {
    if (!esteAdmin()) return;
    editIndex = idx;
    renderPosts();
  }

  function anuleazaEdit() {
    editIndex = null;
    renderPosts();
  }

  async function salveazaEdit(idx) {
    if (!esteAdmin()) return;
    const titlu = document.getElementById('edit-title-' + idx).value.trim();
    const categorie = document.getElementById('edit-category-' + idx).value.trim();
    const continut = document.getElementById('edit-content-' + idx).value.trim();

    if (!titlu || !continut) {
      alert('Title and content are required.');
      return;
    }

    const post = postariCache[idx];
    if (!post) return;
    const { doc, updateDoc, serverTimestamp } = window.firebaseFns;
    try {
      await updateDoc(doc(window.firebaseDb, 'postari', post.id), {
        titlu, categorie: categorie || 'general', continut,
        editat: serverTimestamp()
      });
      editIndex = null;
    } catch (err) {
      console.error(err);
      alert('Error saving edit.');
    }
  }

  async function voteaza(idx, tip) {
    if (!window.firebaseReady) return;
    const post = postariCache[idx];
    if (!post) return;

    bumpButton(post.id, tip);
    marcheazaVotLocal(post.id);

    const voturi = getVoturi();
    const votVechi = voturi[post.id];

    const { doc, updateDoc, increment } = window.firebaseFns;
    const updates = {};

    if (votVechi === tip) {
      if (tip === 'like') updates.likes = increment(-1);
      else updates.dislikes = increment(-1);
      delete voturi[post.id];
    } else {
      if (votVechi === 'like') updates.likes = increment(-1);
      if (votVechi === 'dislike') updates.dislikes = increment(-1);
      if (tip === 'like') updates.likes = increment(votVechi === 'like' ? 0 : 1);
      else updates.dislikes = increment(votVechi === 'dislike' ? 0 : 1);
      voturi[post.id] = tip;
    }

    salveazaVoturi(voturi);

    actualizeazaStareaVot(post.id, voturi[post.id]);

    try {
      await updateDoc(doc(window.firebaseDb, 'postari', post.id), updates);
    } catch (err) {
      console.error(err);
    }
  }

  function actualizeazaStareaVot(postId, vot) {
    const likeBtn = document.querySelector(`[data-post-id="${postId}"] .vote-btn[data-vote-type="like"]`);
    const dislikeBtn = document.querySelector(`[data-post-id="${postId}"] .vote-btn[data-vote-type="dislike"]`);
    if (likeBtn) likeBtn.classList.toggle('voted-like', vot === 'like');
    if (dislikeBtn) dislikeBtn.classList.toggle('voted-dislike', vot === 'dislike');
  }

  function randAdmin() {
    const sec = document.getElementById('admin-section');
    if (esteAdmin()) {
      sec.innerHTML = `
        <section class="blog-add-section">
          <div class="admin-bar">
            <span class="admin-bar-status">Admin mode</span>
            <button class="btn btn-danger" onclick="logoutAdmin()">Exit admin</button>
          </div>
          <div class="blog-add-form">
            <h2>Add a new post</h2>
            <p>Posts are saved to Firebase and visible to everyone.</p>
            <div class="form-group">
              <label for="post-title">Title</label>
              <input type="text" id="post-title" placeholder="Put the post title here">
            </div>
            <div class="form-group">
              <label for="post-category">Category</label>
              <input type="text" id="post-category" placeholder="e.g. dev log, tutorial, thoughts">
            </div>
            <div class="form-group">
              <label for="post-content">Content</label>
              <textarea id="post-content" placeholder="Put the post text here..."></textarea>
            </div>
            <button class="btn btn-primary" onclick="adaugaPostare()">Publish post →</button>
          </div>
        </section>
      `;
    } else {
      sec.innerHTML = '';
    }
  }

  function toggleAdminLogin() {
    if (esteAdmin()) {
      logoutAdmin();
      return;
    }
    const sec = document.getElementById('admin-section');
    if (sec.querySelector('.admin-login')) {
      sec.innerHTML = '';
      return;
    }
    sec.innerHTML = `
      <section class="admin-login">
        <span class="section-tag">/// admin only</span>
        <p>Sign in to publish.</p>
        <div class="admin-login-form">
          <input type="email" id="admin-email" placeholder="email"
                 onkeypress="if(event.key==='Enter') document.getElementById('admin-password').focus()">
          <input type="password" id="admin-password" placeholder="password"
                 onkeypress="if(event.key==='Enter') loginAdmin()">
          <button class="btn btn-primary" onclick="loginAdmin()">Enter →</button>
        </div>
      </section>
    `;
    setTimeout(() => document.getElementById('admin-email').focus(), 50);
    sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function renderPosts(schimbari) {
    randAdmin();
    const lista = document.getElementById('blog-list');
    const gol = document.getElementById('blog-empty');
    const admin = esteAdmin();
    const voturi = getVoturi();

    if (postariCache.length === 0) {
      lista.innerHTML = '';
      gol.innerHTML = '<p>No post yet</p>';
      gol.style.display = 'block';
      return;
    }

    gol.style.display = 'none';
    lista.innerHTML = postariCache.map((p, idx) => {
      const likes = p.likes || 0;
      const dislikes = p.dislikes || 0;
      const votUser = voturi[p.id];

      if (admin && editIndex === idx) {
        return `
          <article class="blog-post blog-post-editing" data-post-id="${p.id}">
            <div class="blog-meta">
              <div>${formateazaData(p.data)}</div>
              <div>· editing</div>
            </div>
            <div class="blog-edit-form">
              <div class="form-group">
                <label>Title</label>
                <input type="text" id="edit-title-${idx}" value="${escapeHtml(p.titlu)}">
              </div>
              <div class="form-group">
                <label>Category</label>
                <input type="text" id="edit-category-${idx}" value="${escapeHtml(p.categorie)}">
              </div>
              <div class="form-group">
                <label>Content</label>
                <textarea id="edit-content-${idx}">${escapeHtml(p.continut)}</textarea>
              </div>
              <div style="display: flex; gap: 0.5rem;">
                <button class="btn btn-primary" onclick="salveazaEdit(${idx})">Save</button>
                <button class="btn btn-ghost" onclick="anuleazaEdit()">Cancel</button>
              </div>
            </div>
            <div></div>
          </article>
        `;
      }

      const adminBtns = admin ? `
        <div class="blog-actions">
          <button class="blog-edit" onclick="intraEdit(${idx})" title="Edit">✎</button>
          <button class="blog-delete" onclick="stergePostare(${idx})" title="Delete">×</button>
        </div>
      ` : '<div></div>';

      const editatMark = p.editat ? `<span class="blog-edited">· edited</span>` : '';

      let postClass = 'blog-post';
      if (schimbari) {
        if (schimbari.adaugate && schimbari.adaugate.includes(p.id)) postClass += ' is-new';
        else if (schimbari.modificate && schimbari.modificate.includes(p.id)) postClass += ' is-updated';
      }

      return `
        <article class="${postClass}" data-post-id="${p.id}">
          <div class="blog-meta">
            <div>${formateazaData(p.data)}</div>
            <div>· ${escapeHtml(p.categorie)} ${editatMark}</div>
          </div>
          <div>
            <h3>${escapeHtml(p.titlu)}</h3>
            <p>${escapeHtml(p.continut)}</p>
            <div class="blog-votes">
              <button class="vote-btn ${votUser === 'like' ? 'voted-like' : ''}"
                      data-vote-type="like"
                      onclick="voteaza(${idx}, 'like')" title="Like">
                <span class="vote-icon">▲</span>
                <span class="vote-count">${likes}</span>
              </button>
              <button class="vote-btn ${votUser === 'dislike' ? 'voted-dislike' : ''}"
                      data-vote-type="dislike"
                      onclick="voteaza(${idx}, 'dislike')" title="Dislike">
                <span class="vote-icon">▼</span>
                <span class="vote-count">${dislikes}</span>
              </button>
            </div>
          </div>
          ${adminBtns}
        </article>
      `;
    }).join('');

    if (schimbari) {
      setTimeout(() => {
        document.querySelectorAll('.is-new, .is-updated').forEach(el => {
          el.classList.remove('is-new', 'is-updated');
        });
      }, 1600);
    }
  }
</script>

</body>
